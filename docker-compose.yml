services:
  # 1. PostgreSQL Database with pgvector (Tier 3)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-ai-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: poe_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poe_clone"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis for Caching and Rate Limiting (Tier 2)
  redis:
    image: redis:alpine
    container_name: enterprise-ai-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 3. MinIO for Local S3 Object Storage (PDFs, Images) (Tier 3)
  minio:
    image: minio/minio
    container_name: enterprise-ai-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web UI Console Port
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. MinIO Setup Utility (Auto-creates your bucket)
  minio-setup:
    image: minio/mc
    container_name: enterprise-ai-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/ai-uploads --ignore-existing;
      mc anonymous set public myminio/ai-uploads;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data: